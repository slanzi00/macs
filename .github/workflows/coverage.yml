name: Coverage

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache

jobs:
  coverage:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git cmake ninja-build pkg-config make \
            gcc-14 g++-14 \
            curl zip unzip tar ca-certificates \
            linux-libc-dev \
            gcovr
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/
            .vcpkg-cache/
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Bootstrap vcpkg
        run: |
          if [ ! -f "$VCPKG_ROOT/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
            "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          fi
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Build (Debug + coverage)
        run: |
          cmake -S . -B build -G "Ninja Multi-Config" \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DMACS_COVERAGE=ON \
            -DMACS_GCOV_EXECUTABLE=gcov-14
          cmake --build build --config Debug

      - name: Run tests
        run: ctest --test-dir build --build-config Debug --output-on-failure

      - name: Generate coverage report
        run: cmake --build build --target coverage --config Debug

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/coverage.xml
          fail_ci_if_error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/coverage/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
